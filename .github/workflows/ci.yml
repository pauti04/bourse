name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Promote any rustc warning to error in CI.
  RUSTFLAGS: -D warnings
  # Promote rustdoc warnings (broken intra-doc links, etc.) to errors.
  RUSTDOCFLAGS: -D warnings

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (from rust-toolchain.toml)
        run: rustup show
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy -- -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (from rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (from rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  doc:
    name: cargo doc --no-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (from rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  bench-compile:
    name: cargo bench --no-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (from rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --workspace --no-run
